<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>"
    />
    <link rel="human-json" href="/human.json" />
    <style>
      body {
        box-sizing: border-box;
        margin: 0;
      }
      .background {
        background-color: deeppink;
      }
      .center-screen {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        text-align: center;
        min-height: 100vh;
        gap: 20px;
      }
      .text {
        font-size: 200px;
        font-family: Helvetica, sans-serif;
        color: dodgerblue;
        text-box-trim: trim-both;
      }
      .arrow-down {
        display: none;
      }
      .anatomical-heart {
        display: flex;
        justify-content: center;
        width: 140px;
      }
      @media screen and (max-width: 700px) {
        .center-screen {
          flex-direction: column;
          gap: 0;
        }
        .arrow-right {
          display: none;
        }
        .arrow-down {
          display: initial;
        }
      }
    </style>
  </head>
  <body class="background">
    <div class="center-screen">
      <div class="text">❤️</div>
      <div class="text arrow-right">➡</div>
      <div class="text arrow-down">⬇</div>
      <div class="anatomical-heart"><div class="text">🫀</div></div>
    </div>
  </body>
</html>
